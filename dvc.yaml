# Placeholder DVC pipeline configuration
stages:
  data_ingestion:
    cmd: python src/data_ingestion.py
    deps:
      - src/data_ingestion.py
    outs:
      - data/raw/
  feature_engineering:
    cmd: python src/feature_engineering.py
    deps:
      - src/feature_engineering.py
      - data/raw/
    outs:
      - data/processed/
  train:
    cmd: python src/train.py
    deps:
      - src/train.py
      - data/processed/
      - params.yaml
    outs:
      - models/
  evaluate:
    cmd: python src/evaluate.py
    deps:
      - src/evaluate.py
      - models/
    metrics:
      - reports/